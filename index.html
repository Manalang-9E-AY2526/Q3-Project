<div class="container text-center mt-5">
	<h1>eSakayMo MRT-3 Fare Guide</h1>
	<p>Check your MRT-3 fare more easily.</p>
</div>


<!-- CALCULATOR -->
<div class="container mt-5">
	<div class="card p-4">

		<h4 class="text-center">Fare Calculator</h4>

		<div class="row mt-3">

			<div class="col-md-4">
				<label>Distance (km)</label>
				<input type="number" id="distance" class="form-control">
			</div>

			<div class="col-md-4">
				<label>Passenger Type</label>
				<select id="discount" class="form-select">
					<option value="regular">Regular</option>
					<option value="student">Student</option>
					<option value="senior">Senior</option>
					<option value="pwd">PWD</option>
				</select>
			</div>

			<div class="col-md-4 d-flex align-items-end">
				<button class="btn btn-primary w-100" onclick="calculateFare()">
					Calculate Fare
				</button>
			</div>

		</div>

		<div class="text-center mt-4">
			<h3 id="fareOutput"></h3>
		</div>

	</div>
</div>
