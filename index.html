<body>

	<nav class="navbar navbar-expand-sm">

				<img src="logo.png" height="40">

<!-- WELCOME -->
	<div class="container text-center mt-5">

		<img src="logo.png" height="120">

		<h1 class="mt-3">Welcome to eSakayMo Fare Guide</h1>

		<p>
			Select your pickup and drop-off stations to estimate your MRT-3 fare.
		</p>

	</div><!-- CALCULATOR -->
	<div class="container mt-5">

		<div class="card p-4">

			<h3 class="text-center">Fare Calculator</h3>

			<div class="row mt-4">

				<!-- PICKUP-->
				<div class="col-md-4">

					<label>Pick-up Station</label>

					<select id="pickup" class="form-select">

						<option value="0">North Ave</option>
						<option value="1">Quezon Ave</option>
						<option value="2">Kamuning</option>
						<option value="3">Cubao</option>
						<option value="4">Santolan</option>
						<option value="5">Ortigas</option>
						<option value="6">Shaw Blvd</option>
						<option value="7">Boni</option>
						<option value="8">Guadalupe</option>
						<option value="9">Buendia</option>
						<option value="10">Ayala</option>
						<option value="11">Magallanes</option>
						<option value="12">Taft Ave</option>

					</select>

				</div>

				<!-- DROPOFF -->
				<div class="col-md-4">

					<label>Drop-off Station</label>

					<select id="dropoff" class="form-select">

						<option value="0">North Ave</option>
						<option value="1">Quezon Ave</option>
						<option value="2">Kamuning</option>
						<option value="3">Cubao</option>
						<option value="4">Santolan</option>
						<option value="5">Ortigas</option>
						<option value="6">Shaw Blvd</option>
						<option value="7">Boni</option>
						<option value="8">Guadalupe</option>
						<option value="9">Buendia</option>
						<option value="10">Ayala</option>
						<option value="11">Magallanes</option>
						<option value="12">Taft Ave</option>

					</select>

				</div>


				<!-- PASSENGER TYPE -->
				<div class="col-md-4">

					<label>Passenger Type</label>

					<select id="discount" class="form-select">

						<option value="regular">Regular</option>
						<option value="student">Student</option>
						<option value="senior">Senior</option>
						<option value="pwd">PWD</option>

					</select>

				</div>

			</div>



			<!-- CALCULATE BUTTON -->
			<div class="text-center mt-4">

				<button class="btn btn-primary" onclick="calculateFare()">
					Calculate Fare
				</button>

			</div>

			<div class="text-center mt-4">

				<h2 id="fareOutput"></h2>

			</div>

		</div>

	</div>
